<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>스마트팩토리 센서 데이터 분석 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 09 · 한기대</span>
    <h1>🏭 스마트팩토리 센서 데이터 분석</h1>
    <p>모터 온도 센서를 1초마다 스트리밍 수신해 슬라이딩 윈도우 Z-score (>2.5)로 이상치를 감지하고 3회 연속 시 예측 정비 경고를 발생시킵니다.</p>
  </header>

  <section class="panel">
    <h2>① 시뮬레이션 제어</h2>
    <div class="row">
      <button class="btn btn--primary" id="startBtn" onclick="toggle()">▶ 시작</button>
      <button class="btn btn--ghost" onclick="injectFault()">⚠ 이상치 주입</button>
      <button class="btn btn--ghost" onclick="reset()">↻ 리셋</button>
      <span style="font-size:.85rem; color:var(--text-dim); margin-left:auto;">윈도우 크기: 20 · 임계 Z-score: 2.5</span>
    </div>
  </section>

  <section class="panel">
    <h2>② MOTOR-01 온도 (°C) · 실시간</h2>
    <svg id="chart" viewBox="0 0 940 220" style="width:100%; height:220px; background:#020617; border-radius:8px;"></svg>
    <div class="row" style="margin-top:10px; gap:14px;">
      <span class="badge badge--info">μ = <span id="mu">—</span></span>
      <span class="badge badge--info">σ = <span id="sd">—</span></span>
      <span class="badge badge--warn">현재 Z = <span id="zscore">—</span></span>
      <span class="badge badge--danger">연속 이상치 = <span id="streak">0</span></span>
    </div>
  </section>

  <section class="panel">
    <h2>③ 알림 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
