<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>실험실 안전 점검 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 03 · 한기대</span>
    <h1>⛑️ 실험실 안전 점검 자동화</h1>
    <p>점검 항목별 상태(OK/WARN/FAIL)와 점검 주기(시간)를 기준으로 미점검·이상을 자동 판정합니다.</p>
  </header>

  <section class="panel">
    <h2>① 실험실 선택 <span class="pill">INPUT</span></h2>
    <div class="row">
      <select id="lab"></select>
      <button class="btn btn--primary" onclick="inspect()">🔎 점검 실행</button>
      <button class="btn btn--ghost" onclick="randomize()">🎲 상태 무작위화</button>
    </div>
  </section>

  <section class="panel">
    <h2>② 점검 결과</h2>
    <div id="report"></div>
  </section>

  <section class="panel">
    <h2>③ 실행 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
