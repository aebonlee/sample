<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>캡스톤 디자인 팀 매칭 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 01 · 한기대</span>
    <h1>🎓 캡스톤 디자인 팀 매칭 시스템</h1>
    <p>학생 프로필(전공·기술·GPA)을 기반으로 팀 평균 GPA·기술 다양성이 균형 잡히도록 자동 매칭하는 데모입니다.</p>
  </header>

  <section class="panel">
    <h2>① 학생 프로필 입력 <span class="pill">INPUT</span></h2>
    <p style="margin:0 0 12px; color:var(--text-dim); font-size:.85rem;">샘플 데이터가 미리 입력되어 있습니다. 필요 시 수정 후 <b>매칭 실행</b>을 눌러보세요.</p>
    <textarea id="studentsInput">S01,CSE,Python|AI,4.2
S02,EE,PCB|C,3.8
S03,ME,CAD|3D,4.0
S04,CSE,Web|DB,3.5
S05,ID,UX|Figma,4.1
S06,EE,IoT|Python,3.9
S07,CSE,Java|Spring,3.7
S08,ME,Robotics|C++,4.3
S09,ID,Branding|UX,3.6</textarea>
    <p style="margin:8px 0 12px; color:var(--text-mute); font-size:.78rem;">형식: <code>ID,전공,기술1|기술2|...,GPA</code></p>
    <div class="row">
      <label class="field">팀 크기
        <input id="teamSize" type="number" min="2" max="6" value="3"/>
      </label>
      <button class="btn btn--primary" onclick="runMatch()">🎯 매칭 실행</button>
    </div>
  </section>

  <section class="panel">
    <h2>② 매칭 결과 <span class="pill">OUTPUT</span></h2>
    <div id="teams"></div>
  </section>

  <section class="panel">
    <h2>③ 실행 로그 (콘솔)</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
