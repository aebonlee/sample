<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>3D 프린터 출력 큐 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 02 · 한기대</span>
    <h1>🖨️ 3D 프린터 출력 큐 관리</h1>
    <p>출력 요청을 마감일·예상 시간 기반 우선순위 큐에 삽입하고, 호환 재료의 가용 프린터에 자동 배정합니다.</p>
  </header>

  <section class="panel">
    <h2>① 출력 요청 추가 <span class="pill">INPUT</span></h2>
    <div class="row" style="margin-bottom:10px;">
      <label class="field">학생
        <input id="f-student" type="text" value="학생D" />
      </label>
      <label class="field">파일명
        <input id="f-file" type="text" value="gear.stl" />
      </label>
      <label class="field">예상 시간(분)
        <input id="f-est" type="number" value="60" />
      </label>
      <label class="field">마감(시간)
        <input id="f-deadline" type="number" value="12" />
      </label>
      <label class="field">재료
        <select id="f-mat"><option>PLA</option><option>ABS</option><option>PETG</option></select>
      </label>
      <button class="btn btn--primary" onclick="addJob()">＋ 추가</button>
      <button class="btn btn--ok" onclick="dispatch()">▶ 디스패치</button>
      <button class="btn btn--ghost" onclick="reset()">↻ 리셋</button>
    </div>
    <p style="color:var(--text-mute); font-size:.78rem; margin:0;">우선순위 점수 = 10000/마감시간 − 예상시간/60 (높을수록 먼저 처리)</p>
  </section>

  <section class="panel">
    <h2>② 프린터 상태</h2>
    <div id="printers" class="grid-3"></div>
  </section>

  <section class="panel">
    <h2>③ 대기 큐 (우선순위순)</h2>
    <table class="t"><thead><tr><th>우선도</th><th>학생</th><th>파일</th><th>재료</th><th>예상</th><th>마감</th></tr></thead>
    <tbody id="queue"></tbody></table>
  </section>

  <section class="panel">
    <h2>④ 실행 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
