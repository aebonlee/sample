<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>스마트 캠퍼스 IoT 에너지 모니터링 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 05 · 한기대</span>
    <h1>⚡ 스마트 캠퍼스 IoT 에너지 모니터링</h1>
    <p>건물별 시간대 베이스라인 대비 30% 초과/절감을 자동 감지하고 24시간 패턴을 시각화합니다.</p>
  </header>

  <section class="panel">
    <h2>① 실시간 측정값 추가</h2>
    <div class="row" style="margin-bottom:10px;">
      <label class="field">건물
        <select id="b"><option>공학관</option><option>기숙사</option><option>정보관</option></select>
      </label>
      <label class="field">시각(시)
        <input id="h" type="number" min="0" max="23" value="22"/>
      </label>
      <label class="field">측정값 (kW)
        <input id="v" type="number" min="0" value="180"/>
      </label>
      <button class="btn btn--primary" onclick="check()">📡 측정</button>
      <button class="btn btn--ghost" onclick="resetChart()">↻ 리셋</button>
    </div>
    <p style="color:var(--text-mute); font-size:.78rem; margin:0;">임계비율: ±30% (베이스라인 대비)</p>
  </section>

  <section class="panel">
    <h2>② 24시간 패턴 (건물별)</h2>
    <svg id="chart" viewBox="0 0 940 280" style="width:100%; height:260px; background:#020617; border-radius:8px;"></svg>
    <div class="row" style="margin-top:10px; gap:14px; font-size:.78rem;">
      <span><span style="display:inline-block;width:12px;height:12px;background:#22d3ee;border-radius:2px;vertical-align:middle;"></span> 공학관</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#fbbf24;border-radius:2px;vertical-align:middle;"></span> 기숙사</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#a78bfa;border-radius:2px;vertical-align:middle;"></span> 정보관</span>
    </div>
  </section>

  <section class="panel">
    <h2>③ 알림 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
