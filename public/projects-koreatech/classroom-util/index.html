<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>강의실 활용도 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 04 · 한기대</span>
    <h1>🏫 강의실 활용도 분석</h1>
    <p>요일 × 교시 50 슬롯 매트릭스를 분석해 강의실별 활용률과 시간대별 한산함을 히트맵으로 시각화합니다.</p>
  </header>

  <section class="panel">
    <h2>① 시간표 입력 <span class="pill">INPUT</span></h2>
    <p style="color:var(--text-mute); font-size:.78rem; margin:0 0 8px;">형식: <code>강의실,요일(0-4),교시(0-9)</code> · 한 줄에 하나씩</p>
    <textarea id="schedule">공학관-101,0,1
공학관-101,0,2
공학관-101,1,3
공학관-101,2,1
공학관-101,2,2
공학관-101,3,4
공학관-202,0,1
정보관-305,1,5
정보관-305,2,5
정보관-305,3,6
정보관-305,4,6
정보관-305,1,6
정보관-305,2,7</textarea>
    <div class="row" style="margin-top:10px;">
      <button class="btn btn--primary" onclick="analyze()">📊 분석 실행</button>
    </div>
  </section>

  <section class="panel">
    <h2>② 강의실별 활용률</h2>
    <table class="t"><thead><tr><th>강의실</th><th>활용률</th><th>슬롯 (사용 / 전체)</th><th>판정</th></tr></thead>
    <tbody id="usageTable"></tbody></table>
  </section>

  <section class="panel">
    <h2>③ 히트맵 (강의실별 요일×교시)</h2>
    <div id="heatmap"></div>
  </section>

  <section class="panel">
    <h2>④ 실행 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
