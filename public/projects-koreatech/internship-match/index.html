<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>산학협력 인턴십 매칭 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 08 · 한기대</span>
    <h1>💼 산학협력 인턴십 매칭</h1>
    <p>학생 프로필과 기업 공고를 가중합(스킬 60% · 전공 25% · 관심 15%)으로 매칭하여 Top 3 기업을 추천합니다.</p>
  </header>

  <section class="panel">
    <h2>① 학생 프로필 <span class="pill">INPUT</span></h2>
    <div class="row">
      <label class="field">전공
        <select id="sMajor"><option>CSE</option><option>EE</option><option>ME</option><option>ID</option></select>
      </label>
      <label class="field">관심 산업
        <select id="sInt"><option>AI</option><option>Embedded</option><option>Web</option><option>Mobile</option><option>Robotics</option></select>
      </label>
      <label class="field">기술 스택 (콤마 구분)
        <input id="sSkills" type="text" value="Python, ML, TensorFlow, NumPy" style="min-width:300px;"/>
      </label>
      <button class="btn btn--primary" onclick="match()">🎯 매칭 실행</button>
    </div>
  </section>

  <section class="panel">
    <h2>② 추천 기업 Top 3</h2>
    <div id="top3"></div>
  </section>

  <section class="panel">
    <h2>③ 전체 기업 매칭 점수</h2>
    <table class="t"><thead><tr><th>기업</th><th>직무</th><th>스킬 일치</th><th>전공 일치</th><th>관심 일치</th><th>적합도</th></tr></thead>
    <tbody id="full"></tbody></table>
  </section>

  <section class="panel">
    <h2>④ 실행 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
