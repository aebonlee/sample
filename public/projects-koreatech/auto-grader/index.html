<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>코딩 과제 자동 채점 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 06 · 한기대</span>
    <h1>🧮 코딩 과제 자동 채점</h1>
    <p>학생 JS 코드(문제: 두 수의 합)를 테스트 케이스 기준으로 자동 채점하고 즉시 피드백을 제공합니다.</p>
  </header>

  <section class="panel">
    <h2>① 학생 제출 코드 <span class="pill">INPUT</span></h2>
    <p style="color:var(--text-mute); font-size:.78rem; margin:0 0 8px;">문제: <code>function sum(a, b)</code> 를 구현하세요. (a + b 반환)</p>
    <textarea id="code">function sum(a, b) {
  return a + b;
}</textarea>
    <div class="row" style="margin-top:10px;">
      <button class="btn btn--primary" onclick="grade()">🧪 채점 실행</button>
      <button class="btn btn--ghost" onclick="loadBuggy()">🐛 버그 있는 코드 시연</button>
    </div>
  </section>

  <section class="panel">
    <h2>② 채점 결과</h2>
    <div id="score" style="margin-bottom:12px;"></div>
    <table class="t"><thead><tr><th>#</th><th>입력</th><th>기대</th><th>실제</th><th>점수</th><th>판정</th></tr></thead>
    <tbody id="cases"></tbody></table>
  </section>

  <section class="panel">
    <h2>③ 피드백</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
