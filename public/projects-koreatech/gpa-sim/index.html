<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>학점/GPA 시뮬레이션 — 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <header class="demo-hero">
    <span class="demo-hero__eyebrow">PROJECT 07 · 한기대</span>
    <h1>📈 학점/GPA 시뮬레이션</h1>
    <p>이수 과목과 향후 과목을 입력해 누적 GPA를 예측하고 목표 GPA 달성에 필요한 평균 학점을 역산합니다.</p>
  </header>

  <section class="panel">
    <h2>① 이수 과목 (현재까지) <span class="pill">INPUT</span></h2>
    <p style="color:var(--text-mute); font-size:.78rem; margin:0 0 8px;">형식: <code>과목명,학점,성적(A+,A,B+,B,C+,C,D,F)</code></p>
    <textarea id="completed">프로그래밍기초,3,A
선형대수,3,B+
컴퓨팅사고,2,A+
전공기초실험,1,A
영어회화,2,B
물리,3,B+</textarea>
  </section>

  <section class="panel">
    <h2>② 향후 수강 예정 + 목표</h2>
    <textarea id="future" style="margin-bottom:10px;">알고리즘,3,A
운영체제,3,B+
자료구조,3,A</textarea>
    <div class="row">
      <label class="field">목표 GPA (4.5 만점)
        <input id="target" type="number" step="0.05" min="0" max="4.5" value="4.0"/>
      </label>
      <label class="field">남은 학점
        <input id="remain" type="number" min="1" value="9"/>
      </label>
      <button class="btn btn--primary" onclick="simulate()">📊 시뮬레이션</button>
    </div>
  </section>

  <section class="panel">
    <h2>③ 결과</h2>
    <div class="grid-3" id="result"></div>
  </section>

  <section class="panel">
    <h2>④ 실행 로그</h2>
    <pre class="output" id="log"></pre>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
