<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot — AI 번역기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="brand">🌐 <b>Polyglot</b><span>AI 신경망 번역</span></div>
    <button class="hist">📜 기록</button>
  </header>

  <main class="layout">
    <div class="lang-bar">
      <select id="from">
        <option value="auto">자동 감지</option>
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="vi">Tiếng Việt</option>
        <option value="es">Español</option>
      </select>
      <button id="swap" class="swap">⇄</button>
      <select id="to">
        <option value="en" selected>English</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="vi">Tiếng Việt</option>
        <option value="es">Español</option>
      </select>
    </div>

    <section class="tx-wrap">
      <article class="card">
        <header>
          <span id="fromLabel">한국어</span>
          <button id="clearBtn">지우기</button>
        </header>
        <textarea id="src" placeholder="번역할 텍스트를 입력하세요..." rows="8"></textarea>
        <footer>
          <button id="micBtn">🎙 음성 입력</button>
          <span><span id="cc">0</span> / 5,000</span>
        </footer>
      </article>

      <article class="card card--out">
        <header>
          <span id="toLabel">English</span>
          <button id="copyBtn">복사</button>
        </header>
        <div id="dst" class="output">번역 결과가 여기에 표시됩니다.</div>
        <footer>
          <button id="speakBtn">🔊 듣기</button>
          <span id="conf">신뢰도: -</span>
        </footer>
      </article>
    </section>

    <section class="tools">
      <div class="tool">
        <h3>💡 표현 추천</h3>
        <p id="alt">텍스트를 번역하면 대체 표현을 추천해드립니다.</p>
      </div>
      <div class="tool">
        <h3>📖 단어 분석</h3>
        <ul id="dict"><li class="muted">번역된 텍스트의 주요 단어를 분석합니다.</li></ul>
      </div>
    </section>

    <section class="examples">
      <h3>예시로 시작하기</h3>
      <div class="ex">
        <button data-t="안녕하세요. 만나서 반갑습니다.">안녕하세요. 만나서 반갑습니다.</button>
        <button data-t="이 도서관까지 어떻게 가나요?">이 도서관까지 어떻게 가나요?</button>
        <button data-t="회의는 오후 3시에 시작합니다.">회의는 오후 3시에 시작합니다.</button>
        <button data-t="이 음식 정말 맛있어요!">이 음식 정말 맛있어요!</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
