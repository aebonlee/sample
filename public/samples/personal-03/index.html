<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>@minji.creator — 링크 모음</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="profile">
      <div class="avatar">민</div>
      <h1>@minji.creator</h1>
      <p class="bio">콘텐츠 크리에이터 · 사진 · 글<br/>매주 화요일 새 영상 업로드 ✨</p>
      <div class="socials">
        <a class="soc" title="Instagram">📷</a>
        <a class="soc" title="YouTube">▶</a>
        <a class="soc" title="X">𝕏</a>
        <a class="soc" title="TikTok">🎵</a>
        <a class="soc" title="Email">✉</a>
      </div>
    </header>

    <section class="links" id="links">
      <a class="lk lk-feature" data-id="1">
        <div class="ic">🎬</div>
        <div>
          <b>이번 주 새 영상</b>
          <span>"제주도 일주일 살기 vlog"</span>
        </div>
        <em>NEW</em>
      </a>

      <a class="lk" data-id="2">
        <div class="ic">📷</div>
        <div><b>인스타그램</b><span>@minji.creator · 팔로워 28.5K</span></div>
      </a>

      <a class="lk" data-id="3">
        <div class="ic">▶</div>
        <div><b>유튜브</b><span>구독자 12.4K</span></div>
      </a>

      <a class="lk" data-id="4">
        <div class="ic">📝</div>
        <div><b>네이버 블로그</b><span>여행 · 일상 · 사진 일기</span></div>
      </a>

      <a class="lk" data-id="5">
        <div class="ic">🛍️</div>
        <div><b>스마트스토어</b><span>크리에이터 굿즈샵</span></div>
      </a>

      <a class="lk" data-id="6">
        <div class="ic">💌</div>
        <div><b>뉴스레터 구독</b><span>매주 토요일 발송</span></div>
      </a>

      <a class="lk" data-id="7">
        <div class="ic">📩</div>
        <div><b>비즈니스 문의</b><span>협찬·광고는 이메일로</span></div>
      </a>
    </section>

    <p class="hint">총 <b id="clicks">0</b>번 클릭됨</p>

    <footer class="foot">
      <button id="themeBtn" class="theme">🌙</button>
      <p>Made with Sample Gallery</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
