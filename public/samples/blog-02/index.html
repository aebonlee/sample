<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>devnotes — 개발자 기술 블로그</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topnav">
    <div class="inner">
      <a class="brand"><b>dev</b>notes</a>
      <nav>
        <a href="#" class="active">홈</a>
        <a href="#">시리즈</a>
        <a href="#">태그</a>
        <a href="#">소개</a>
      </nav>
      <button id="themeBtn" class="theme">🌙</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <p class="kicker">DEVELOPER · 글쓰기</p>
      <h1>매주 한 편씩,<br/>실무에서 배운 것들.</h1>
      <p class="lead">프론트엔드, 백엔드, 인프라까지 직접 부딪치며 알게 된 것을 기록합니다.</p>
      <form class="searchbar" onsubmit="event.preventDefault(); window.app.search(this.q.value)">
        <input name="q" placeholder="제목, 태그로 검색 (예: react, postgres)" />
        <button>검색</button>
      </form>
    </section>

    <section class="filter">
      <h3>태그</h3>
      <div class="tags" id="tags"></div>
    </section>

    <section class="grid" id="grid"></section>

    <p id="empty" class="empty" hidden>일치하는 글이 없어요.</p>
  </main>

  <footer class="foot">
    © 2025 devnotes · 잘못된 정보를 발견하면 깃허브 이슈로 알려주세요.
  </footer>

  <script src="script.js"></script>
</body>
</html>
