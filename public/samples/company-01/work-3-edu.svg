<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Atlas Edu 학습 플랫폼 케이스">
  <defs>
    <linearGradient id="ebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ebg)"/>

  <!-- 대시보드 -->
  <g transform="translate(60 70)">
    <rect x="0" y="0" width="480" height="260" rx="10" fill="#fff" stroke="#a7f3d0" stroke-width="2"/>

    <!-- 헤더 -->
    <rect x="0" y="0" width="480" height="40" rx="10" fill="#10b981"/>
    <rect x="0" y="30" width="480" height="10" fill="#10b981"/>
    <text x="20" y="26" font-family="-apple-system,sans-serif" font-size="13" font-weight="800" fill="#fff">Atlas Edu — 학생 대시보드</text>
    <circle cx="450" cy="20" r="12" fill="#fef3c7"/>
    <text x="450" y="24" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="800" fill="#10b981">L</text>

    <!-- 통계 카드 4개 -->
    <g transform="translate(20 60)">
      <rect width="100" height="60" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="10" y="20" font-family="-apple-system,sans-serif" font-size="9" font-weight="700" fill="#065f46">진행 강의</text>
      <text x="10" y="42" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#064e3b">12</text>

      <rect x="115" width="100" height="60" rx="6" fill="#dbeafe" stroke="#bfdbfe"/>
      <text x="125" y="20" font-family="-apple-system,sans-serif" font-size="9" font-weight="700" fill="#1e40af">완료 과제</text>
      <text x="125" y="42" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#1e3a8a">47</text>

      <rect x="230" width="100" height="60" rx="6" fill="#fef3c7" stroke="#fde68a"/>
      <text x="240" y="20" font-family="-apple-system,sans-serif" font-size="9" font-weight="700" fill="#92400e">평균 점수</text>
      <text x="240" y="42" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#78350f">92</text>

      <rect x="345" width="115" height="60" rx="6" fill="#ede9fe" stroke="#ddd6fe"/>
      <text x="355" y="20" font-family="-apple-system,sans-serif" font-size="9" font-weight="700" fill="#5b21b6">WAU 증가</text>
      <text x="355" y="42" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#4c1d95">+62%</text>
    </g>

    <!-- 강의 리스트 -->
    <g transform="translate(20 140)">
      <text x="0" y="0" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#0f172a">진행 중인 강의</text>

      <!-- row 1 -->
      <g transform="translate(0 16)">
        <rect width="440" height="32" rx="4" fill="#f0fdf4"/>
        <rect x="8" y="10" width="12" height="12" rx="2" fill="#10b981"/>
        <text x="30" y="20" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#0f172a">미적분학 입문</text>
        <rect x="180" y="14" width="200" height="4" rx="2" fill="#d1fae5"/>
        <rect x="180" y="14" width="140" height="4" rx="2" fill="#10b981"/>
        <text x="390" y="20" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#065f46">70%</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(0 54)">
        <rect width="440" height="32" rx="4" fill="#f0f9ff"/>
        <rect x="8" y="10" width="12" height="12" rx="2" fill="#3b82f6"/>
        <text x="30" y="20" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#0f172a">파이썬 기초</text>
        <rect x="180" y="14" width="200" height="4" rx="2" fill="#dbeafe"/>
        <rect x="180" y="14" width="180" height="4" rx="2" fill="#3b82f6"/>
        <text x="390" y="20" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#1e40af">90%</text>
      </g>
      <!-- row 3 -->
      <g transform="translate(0 92)">
        <rect width="440" height="32" rx="4" fill="#fef3c7"/>
        <rect x="8" y="10" width="12" height="12" rx="2" fill="#f59e0b"/>
        <text x="30" y="20" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#0f172a">영어 작문</text>
        <rect x="180" y="14" width="200" height="4" rx="2" fill="#fef3c7"/>
        <rect x="180" y="14" width="60" height="4" rx="2" fill="#f59e0b"/>
        <text x="390" y="20" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#92400e">30%</text>
      </g>
    </g>
  </g>

  <text x="60" y="50" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#a7f3d0" letter-spacing="2">CASE 03 · EDUCATION</text>
  <text x="60" y="365" font-family="-apple-system,sans-serif" font-size="14" font-weight="800" fill="#fff">학생 대시보드 신설 · WAU +62%</text>
</svg>
