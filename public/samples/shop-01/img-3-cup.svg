<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="브루잉된 커피 — 위에서 본 컵">
  <defs>
    <radialGradient id="bgC" cx="50%" cy="40%" r="80%">
      <stop offset="0" stop-color="#71717a"/>
      <stop offset="1" stop-color="#27272a"/>
    </radialGradient>
    <radialGradient id="coffeeLiq" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="0.6" stop-color="#5c2510"/>
      <stop offset="1" stop-color="#2a1108"/>
    </radialGradient>
    <linearGradient id="cupBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f4"/>
      <stop offset="1" stop-color="#a8a29e"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bgC)"/>

  <!-- 우드 보드 텍스처 -->
  <g opacity="0.18">
    <line x1="0" y1="120" x2="600" y2="100" stroke="#1c1917" stroke-width="1"/>
    <line x1="0" y1="220" x2="600" y2="210" stroke="#1c1917" stroke-width="1"/>
    <line x1="0" y1="350" x2="600" y2="360" stroke="#1c1917" stroke-width="1"/>
    <line x1="0" y1="470" x2="600" y2="480" stroke="#1c1917" stroke-width="1"/>
  </g>

  <!-- 컵 (위에서) -->
  <g>
    <!-- 받침 -->
    <ellipse cx="300" cy="330" rx="220" ry="40" fill="rgba(0,0,0,0.4)"/>
    <ellipse cx="300" cy="320" rx="220" ry="38" fill="url(#cupBody)"/>
    <ellipse cx="300" cy="316" rx="200" ry="32" fill="#fafaf9"/>

    <!-- 컵 외벽 -->
    <ellipse cx="300" cy="298" rx="155" ry="32" fill="rgba(0,0,0,0.25)"/>
    <ellipse cx="300" cy="294" rx="155" ry="30" fill="url(#cupBody)"/>
    <ellipse cx="300" cy="290" rx="140" ry="26" fill="#fafaf9"/>

    <!-- 커피 액체 (안쪽) -->
    <ellipse cx="300" cy="290" rx="138" ry="25" fill="url(#coffeeLiq)"/>
    <ellipse cx="300" cy="285" rx="130" ry="22" fill="#3a1810" opacity="0.7"/>

    <!-- 크레마 (위 거품) -->
    <ellipse cx="300" cy="282" rx="120" ry="18" fill="#a16235" opacity="0.6"/>
    <ellipse cx="280" cy="278" rx="38" ry="6" fill="#d6997a" opacity="0.55"/>
    <ellipse cx="320" cy="282" rx="28" ry="4" fill="#d6997a" opacity="0.45"/>

    <!-- 하트 라떼아트 (옵션) -->
    <g opacity="0.6">
      <path d="M 280 275 Q 270 268 280 268 Q 285 263 290 268 Q 305 261 305 275 Q 305 280 290 290 Q 275 280 280 275 Z" fill="#fff8e8"/>
    </g>

    <!-- 김 -->
    <g opacity="0.4" stroke="#fff" stroke-width="2" fill="none">
      <path d="M 250 250 Q 245 230 255 215 Q 250 200 260 185"/>
      <path d="M 300 240 Q 295 220 305 205 Q 300 190 310 175"/>
      <path d="M 350 250 Q 345 230 355 215 Q 350 200 360 185"/>
    </g>
  </g>

  <!-- 옆에 원두 두 알 -->
  <g>
    <ellipse cx="120" cy="450" rx="28" ry="16" fill="#3a1810" transform="rotate(-15 120 450)"/>
    <path d="M 100 446 Q 120 442 140 446" stroke="#0c0502" stroke-width="1" fill="none" transform="rotate(-15 120 450)" opacity="0.6"/>
    <ellipse cx="500" cy="470" rx="26" ry="15" fill="#3a1810" transform="rotate(20 500 470)"/>
    <ellipse cx="480" cy="510" rx="22" ry="13" fill="#2a1108" transform="rotate(-5 480 510)"/>
  </g>
</svg>
