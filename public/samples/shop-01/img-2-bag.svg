<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="원두 패키지 — 마이크로 랏 봉투">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1c1917"/>
      <stop offset="0.5" stop-color="#44403c"/>
      <stop offset="1" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bgB)"/>

  <!-- 그림자 -->
  <ellipse cx="300" cy="540" rx="180" ry="20" fill="rgba(0,0,0,0.35)"/>

  <!-- 봉투 본체 -->
  <g>
    <!-- 봉투 -->
    <path d="M 180 160 L 420 160 L 430 530 L 170 530 Z" fill="url(#bag)" stroke="#0c0a09" stroke-width="2"/>
    <!-- 봉투 윗부분 (집게) -->
    <path d="M 175 160 L 425 160 L 420 130 L 180 130 Z" fill="#1c1917" stroke="#0c0a09"/>
    <rect x="195" y="118" width="210" height="12" rx="2" fill="#78716c"/>
    <rect x="195" y="118" width="210" height="3" fill="#a8a29e"/>

    <!-- 라벨 -->
    <rect x="210" y="240" width="180" height="200" fill="url(#label)" rx="2" stroke="#78350f" stroke-width="1"/>

    <!-- 라벨 텍스트 -->
    <g font-family="-apple-system, sans-serif" fill="#451a03" text-anchor="middle">
      <text x="300" y="270" font-size="11" font-weight="700" letter-spacing="3">NORTHPEAK ORIGIN</text>
      <line x1="240" y1="280" x2="360" y2="280" stroke="#92400e" stroke-width="1"/>
      <text x="300" y="310" font-size="22" font-weight="800">에티오피아</text>
      <text x="300" y="335" font-size="22" font-weight="800">예가체프</text>
      <text x="300" y="365" font-size="13" font-weight="600" fill="#78350f">Konga 마이크로 랏</text>

      <!-- 노트 -->
      <text x="300" y="395" font-size="9" font-weight="600" letter-spacing="1">TASTING NOTES</text>
      <text x="300" y="412" font-size="10" fill="#5c2510">Floral · Bright Citrus · Honey</text>

      <!-- 무게 -->
      <text x="300" y="430" font-size="9" font-weight="700">NET WT 200g</text>
    </g>

    <!-- 봉투 옆면 음영 -->
    <path d="M 180 160 L 420 160 L 430 530 L 170 530 Z" fill="url(#bag)" opacity="0"/>
    <path d="M 180 160 L 200 175 L 210 530 L 170 530 Z" fill="rgba(0,0,0,0.35)"/>
    <path d="M 420 160 L 400 175 L 390 530 L 430 530 Z" fill="rgba(0,0,0,0.35)"/>

    <!-- 광택 -->
    <rect x="280" y="160" width="6" height="370" fill="rgba(255,255,255,0.06)"/>
  </g>

  <!-- 옆에 흩어진 원두 한두 알 -->
  <g>
    <ellipse cx="120" cy="510" rx="22" ry="13" fill="#2a1108" transform="rotate(-20 120 510)"/>
    <ellipse cx="500" cy="500" rx="20" ry="12" fill="#3a1810" transform="rotate(18 500 500)"/>
    <ellipse cx="490" cy="540" rx="16" ry="10" fill="#2a1108" transform="rotate(-10 490 540)"/>
  </g>
</svg>
