<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="로스팅 — 원두를 볶는 팬">
  <defs>
    <radialGradient id="bgR" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#451a03"/>
      <stop offset="1" stop-color="#0c0a09"/>
    </radialGradient>
    <radialGradient id="pan" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#525252"/>
      <stop offset="1" stop-color="#171717"/>
    </radialGradient>
    <radialGradient id="hot" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="0.7" stop-color="#dc2626" stop-opacity="0.3"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bgR)"/>

  <!-- 열 발광 -->
  <ellipse cx="300" cy="300" rx="280" ry="180" fill="url(#hot)"/>

  <!-- 팬 (그림자) -->
  <ellipse cx="300" cy="370" rx="220" ry="32" fill="rgba(0,0,0,0.55)"/>
  <!-- 팬 본체 -->
  <ellipse cx="300" cy="350" rx="210" ry="50" fill="url(#pan)"/>
  <ellipse cx="300" cy="345" rx="195" ry="42" fill="#262626"/>
  <ellipse cx="300" cy="340" rx="180" ry="36" fill="#1c1917"/>

  <!-- 손잡이 -->
  <rect x="500" y="338" width="80" height="14" rx="6" fill="#404040"/>
  <rect x="565" y="335" width="14" height="20" rx="3" fill="#262626"/>

  <!-- 원두들 (팬 안) -->
  <g>
    <!-- 짙게 볶인 원두 -->
    <ellipse cx="220" cy="335" rx="22" ry="13" fill="#3a1810" transform="rotate(-15 220 335)"/>
    <ellipse cx="260" cy="345" rx="22" ry="13" fill="#2a1108" transform="rotate(20 260 345)"/>
    <ellipse cx="300" cy="335" rx="22" ry="13" fill="#4a2010" transform="rotate(-8 300 335)"/>
    <ellipse cx="340" cy="350" rx="22" ry="13" fill="#3a1810" transform="rotate(15 340 350)"/>
    <ellipse cx="380" cy="335" rx="22" ry="13" fill="#5c2510" transform="rotate(-22 380 335)"/>

    <ellipse cx="200" cy="355" rx="20" ry="12" fill="#2a1108" transform="rotate(10 200 355)"/>
    <ellipse cx="240" cy="362" rx="20" ry="12" fill="#3a1810" transform="rotate(-18 240 362)"/>
    <ellipse cx="280" cy="358" rx="20" ry="12" fill="#4a2010" transform="rotate(25 280 358)"/>
    <ellipse cx="320" cy="362" rx="20" ry="12" fill="#3a1810" transform="rotate(-5 320 362)"/>
    <ellipse cx="360" cy="358" rx="20" ry="12" fill="#5c2510" transform="rotate(12 360 358)"/>
    <ellipse cx="400" cy="365" rx="20" ry="12" fill="#3a1810" transform="rotate(-20 400 365)"/>

    <!-- 빛 반사 -->
    <ellipse cx="225" cy="332" rx="6" ry="2" fill="#fbbf24" opacity="0.6"/>
    <ellipse cx="305" cy="332" rx="6" ry="2" fill="#fbbf24" opacity="0.6"/>
    <ellipse cx="385" cy="332" rx="6" ry="2" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- 김/연기 -->
  <g opacity="0.35" fill="none" stroke="#fff" stroke-width="2">
    <path d="M 220 280 Q 215 250 225 230 Q 220 210 230 190"/>
    <path d="M 280 270 Q 275 240 285 220 Q 280 200 290 180"/>
    <path d="M 340 280 Q 335 250 345 230 Q 340 210 350 190"/>
    <path d="M 400 270 Q 395 240 405 220 Q 400 200 410 180"/>
  </g>

  <!-- 불꽃 (팬 아래) -->
  <g opacity="0.7">
    <ellipse cx="260" cy="430" rx="40" ry="14" fill="#dc2626"/>
    <ellipse cx="260" cy="425" rx="30" ry="10" fill="#fbbf24"/>
    <ellipse cx="340" cy="430" rx="40" ry="14" fill="#dc2626"/>
    <ellipse cx="340" cy="425" rx="30" ry="10" fill="#fbbf24"/>
  </g>
</svg>
