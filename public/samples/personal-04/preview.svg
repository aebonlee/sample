<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" role="img" aria-label="취업 준비 이력 포트폴리오 미리보기">
  <defs>
    <linearGradient id="bg-pn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="avatar-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg-pn)"/>

  <!-- 네비 -->
  <g font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <rect x="0" y="0" width="1440" height="64" fill="#0b1120" opacity="0.9"/>
    <text x="80" y="40" fill="#fff" font-size="20" font-weight="700">PORTFOLIO</text>
    <g font-size="14" fill="#94a3b8">
      <text x="990" y="40">소개</text>
      <text x="1050" y="40">경력</text>
      <text x="1110" y="40">강점</text>
      <text x="1170" y="40">스킬</text>
      <text x="1230" y="40">활동</text>
      <text x="1290" y="40">연락</text>
    </g>
    <!-- 다크 모드 토글 -->
    <circle cx="1370" cy="33" r="14" fill="#1e293b" stroke="#334155"/>
    <circle cx="1376" cy="33" r="6" fill="#fbbf24"/>
  </g>

  <!-- HERO -->
  <g transform="translate(0,64)">
    <rect width="1440" height="280" fill="url(#hero-grad)" opacity="0.95"/>
    <!-- 노이즈/패턴 -->
    <g opacity="0.1" fill="#fff">
      <circle cx="120" cy="80" r="2"/>
      <circle cx="1320" cy="180" r="3"/>
      <circle cx="800" cy="60" r="1.5"/>
      <circle cx="1200" cy="220" r="2"/>
      <circle cx="200" cy="220" r="2"/>
    </g>
    <g transform="translate(80,80)" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" fill="#fff">
      <rect width="120" height="28" rx="14" fill="#fff" opacity="0.15"/>
      <text x="14" y="19" font-size="12" font-weight="600">2026 신입 지원</text>
      <text x="0" y="80" font-size="48" font-weight="800" letter-spacing="-0.02em">안녕하세요, 박지우입니다</text>
      <text x="0" y="118" font-size="20" opacity="0.85">한국기술교육대학교 컴퓨터공학 · 백엔드 개발자 지망</text>

      <g transform="translate(0,160)">
        <rect width="148" height="44" rx="22" fill="#fff"/>
        <text x="74" y="29" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">이력서 다운로드 ↓</text>
        <rect x="160" width="148" height="44" rx="22" fill="none" stroke="#fff" stroke-width="2"/>
        <text x="234" y="29" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">연락하기 →</text>
      </g>
    </g>

    <!-- 아바타 -->
    <g transform="translate(1150,80)">
      <circle cx="100" cy="100" r="86" fill="url(#avatar-grad)" stroke="#fff" stroke-width="4"/>
      <text x="100" y="120" font-size="56" font-weight="800" fill="#fff" text-anchor="middle">박</text>
    </g>
  </g>

  <!-- 통계 카운트업 -->
  <g transform="translate(80,392)">
    <g font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
      <g transform="translate(0,0)">
        <rect width="300" height="120" rx="14" fill="url(#card-grad)" stroke="#1e293b"/>
        <text x="24" y="48" font-size="36" font-weight="800" fill="#22d3ee">4.21</text>
        <text x="24" y="76" font-size="13" fill="#94a3b8">평균학점 / 4.5</text>
        <text x="24" y="100" font-size="11" fill="#64748b">전공 우등생</text>
      </g>
      <g transform="translate(320,0)">
        <rect width="300" height="120" rx="14" fill="url(#card-grad)" stroke="#1e293b"/>
        <text x="24" y="48" font-size="36" font-weight="800" fill="#a78bfa">12+</text>
        <text x="24" y="76" font-size="13" fill="#94a3b8">완료 프로젝트</text>
        <text x="24" y="100" font-size="11" fill="#64748b">캡스톤·동아리·공모전</text>
      </g>
      <g transform="translate(640,0)">
        <rect width="300" height="120" rx="14" fill="url(#card-grad)" stroke="#1e293b"/>
        <text x="24" y="48" font-size="36" font-weight="800" fill="#fb7185">3</text>
        <text x="24" y="76" font-size="13" fill="#94a3b8">수상 경력</text>
        <text x="24" y="100" font-size="11" fill="#64748b">교내 + 전국 공모전</text>
      </g>
      <g transform="translate(960,0)">
        <rect width="300" height="120" rx="14" fill="url(#card-grad)" stroke="#1e293b"/>
        <text x="24" y="48" font-size="36" font-weight="800" fill="#fbbf24">820+</text>
        <text x="24" y="76" font-size="13" fill="#94a3b8">GitHub 커밋</text>
        <text x="24" y="100" font-size="11" fill="#64748b">최근 1년 활동</text>
      </g>
    </g>
  </g>

  <!-- 경력 타임라인 -->
  <g transform="translate(80,560)" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#fff">📋 경력 타임라인</text>
    <line x1="20" y1="40" x2="20" y2="280" stroke="#334155" stroke-width="2"/>

    <g transform="translate(0,60)">
      <circle cx="20" cy="0" r="10" fill="#22d3ee"/>
      <rect x="48" y="-24" width="600" height="56" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <text x="68" y="-4" font-size="15" font-weight="700" fill="#fff">DreamIT Biz 백엔드 인턴십</text>
      <text x="68" y="18" font-size="12" fill="#94a3b8">2025.07 — 2025.09 · Node.js / PostgreSQL / Docker</text>
    </g>

    <g transform="translate(0,140)">
      <circle cx="20" cy="0" r="10" fill="#a78bfa"/>
      <rect x="48" y="-24" width="600" height="56" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <text x="68" y="-4" font-size="15" font-weight="700" fill="#fff">한기대 코딩 동아리 KIT 회장</text>
      <text x="68" y="18" font-size="12" fill="#94a3b8">2024.03 — 현재 · 정기 세미나 + 해커톤 운영</text>
    </g>

    <g transform="translate(0,220)">
      <circle cx="20" cy="0" r="10" fill="#fb7185"/>
      <rect x="48" y="-24" width="600" height="56" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <text x="68" y="-4" font-size="15" font-weight="700" fill="#fff">전국 대학생 SW 경진대회 동상</text>
      <text x="68" y="18" font-size="12" fill="#94a3b8">2024.10 · "스마트 캠퍼스 IoT 에너지" 출품</text>
    </g>
  </g>

  <!-- 핵심 강점 (우측) -->
  <g transform="translate(750,560)" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#fff">⭐ 핵심 강점</text>

    <g transform="translate(0,30)">
      <rect width="290" height="80" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <rect x="0" y="0" width="4" height="80" fill="#22d3ee"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#fff">📊 데이터 분석</text>
      <text x="20" y="50" font-size="12" fill="#94a3b8">Python · pandas · 시각화</text>
      <text x="20" y="68" font-size="11" fill="#64748b">캠퍼스 IoT 데이터 1.2M건 분석</text>
    </g>
    <g transform="translate(300,30)">
      <rect width="290" height="80" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <rect x="0" y="0" width="4" height="80" fill="#a78bfa"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#fff">⚙️ 백엔드 개발</text>
      <text x="20" y="50" font-size="12" fill="#94a3b8">FastAPI · PostgreSQL · Redis</text>
      <text x="20" y="68" font-size="11" fill="#64748b">실시간 API 응답 50ms 이내</text>
    </g>
    <g transform="translate(0,120)">
      <rect width="290" height="80" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <rect x="0" y="0" width="4" height="80" fill="#fb7185"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#fff">🤝 협업/리딩</text>
      <text x="20" y="50" font-size="12" fill="#94a3b8">스크럼 · 코드 리뷰 · 멘토링</text>
      <text x="20" y="68" font-size="11" fill="#64748b">7명 팀 리드 (캡스톤)</text>
    </g>
    <g transform="translate(300,120)">
      <rect width="290" height="80" rx="10" fill="url(#card-grad)" stroke="#1e293b"/>
      <rect x="0" y="0" width="4" height="80" fill="#fbbf24"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#fff">📝 기술 문서화</text>
      <text x="20" y="50" font-size="12" fill="#94a3b8">기술 블로그 · 발표 자료</text>
      <text x="20" y="68" font-size="11" fill="#64748b">월 2~3편 정기 작성</text>
    </g>
  </g>
</svg>
