<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>두더지 잡기 — Whack a Mole</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <header>
      <h1>🔨 두더지 잡기</h1>
      <p>30초 안에 최대한 많이 잡아보세요!</p>
    </header>

    <div class="hud">
      <div class="stat"><span>점수</span><b id="score">0</b></div>
      <div class="stat"><span>남은 시간</span><b id="time">30</b><em>s</em></div>
      <div class="stat"><span>최고 기록</span><b id="best">0</b></div>
      <div class="stat"><span>콤보</span><b id="combo">0</b><em>×</em></div>
    </div>

    <div class="board" id="board"></div>

    <div class="actions">
      <div class="diff">
        <span>난이도</span>
        <button class="lv" data-lv="easy">쉬움</button>
        <button class="lv active" data-lv="normal">보통</button>
        <button class="lv" data-lv="hard">어려움</button>
      </div>
      <button id="startBtn" class="start">▶ 시작</button>
    </div>

    <div id="result" class="result" hidden>
      <h2 id="rTitle">게임 종료!</h2>
      <p id="rSub">최종 점수: 0점</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
