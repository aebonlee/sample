<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" role="img" aria-label="조용한 카페에서 일하기">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#f97316"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <!-- 창문 너머 하늘 -->
  <rect width="800" height="480" fill="url(#sky)"/>

  <!-- 도시 실루엣 (해질녘) -->
  <g fill="#1c1917" opacity="0.9">
    <rect x="0" y="280" width="800" height="200"/>
    <rect x="40" y="220" width="50" height="60"/>
    <rect x="110" y="180" width="60" height="100"/>
    <rect x="190" y="240" width="45" height="40"/>
    <rect x="250" y="160" width="70" height="120"/>
    <rect x="340" y="200" width="55" height="80"/>
    <rect x="410" y="180" width="80" height="100"/>
    <rect x="510" y="220" width="50" height="60"/>
    <rect x="580" y="160" width="65" height="120"/>
    <rect x="660" y="200" width="50" height="80"/>
    <rect x="730" y="230" width="40" height="50"/>
  </g>

  <!-- 창문 빛 -->
  <g fill="#fde047" opacity="0.85">
    <rect x="120" y="200" width="6" height="6"/>
    <rect x="135" y="220" width="6" height="6"/>
    <rect x="260" y="180" width="6" height="6"/>
    <rect x="270" y="200" width="6" height="6"/>
    <rect x="420" y="200" width="6" height="6"/>
    <rect x="450" y="220" width="6" height="6"/>
    <rect x="590" y="180" width="6" height="6"/>
    <rect x="610" y="200" width="6" height="6"/>
  </g>

  <!-- 노트북 (전면 실루엣) -->
  <g transform="translate(400 380)" fill="#0f172a">
    <rect x="-130" y="0" width="260" height="14" rx="2"/>
    <path d="M -110 0 L -110 -90 L 110 -90 L 110 0 Z"/>
    <rect x="-100" y="-82" width="200" height="76" fill="#1e293b"/>
    <!-- 화면 글로우 -->
    <rect x="-100" y="-82" width="200" height="76" fill="#22d3ee" opacity="0.18"/>
    <!-- 화면 코드 라인 -->
    <g fill="#94a3b8" opacity="0.7">
      <rect x="-90" y="-72" width="80" height="3"/>
      <rect x="-90" y="-64" width="120" height="3"/>
      <rect x="-90" y="-56" width="60" height="3"/>
      <rect x="-90" y="-48" width="140" height="3"/>
      <rect x="-90" y="-40" width="100" height="3"/>
      <rect x="-90" y="-32" width="80" height="3"/>
    </g>
  </g>

  <!-- 커피잔 -->
  <g transform="translate(220 400)" fill="#1c1917">
    <ellipse cx="0" cy="-2" rx="32" ry="6" fill="#92400e"/>
    <path d="M -28 -2 L -22 30 Q -22 36 0 36 Q 22 36 22 30 L 28 -2 Z"/>
    <ellipse cx="0" cy="-2" rx="28" ry="5" fill="#7c2d12"/>
    <!-- 김 -->
    <path d="M -8 -20 Q -12 -32 -4 -42 Q -8 -52 0 -60" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
</svg>
