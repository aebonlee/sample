<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" role="img" aria-label="CSS 변수와 다크 모드">
  <defs>
    <linearGradient id="splitL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#e7e5e4"/>
    </linearGradient>
    <linearGradient id="splitR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#1c1917"/>
    </linearGradient>
  </defs>
  <!-- 좌측 라이트 -->
  <rect x="0" y="0" width="400" height="480" fill="url(#splitL)"/>
  <!-- 우측 다크 -->
  <rect x="400" y="0" width="400" height="480" fill="url(#splitR)"/>

  <!-- 라이트: 카드 UI -->
  <g transform="translate(50 100)">
    <rect width="300" height="280" rx="14" fill="#fff" stroke="#e5e7eb"/>
    <rect x="20" y="20" width="260" height="100" rx="8" fill="#e0e7ff"/>
    <circle cx="60" cy="65" r="20" fill="#6366f1"/>
    <rect x="92" y="50" width="120" height="10" rx="2" fill="#4338ca"/>
    <rect x="92" y="68" width="160" height="6" rx="2" fill="#a5b4fc"/>
    <rect x="20" y="140" width="180" height="10" rx="2" fill="#1f2937"/>
    <rect x="20" y="158" width="240" height="8" rx="2" fill="#9ca3af"/>
    <rect x="20" y="172" width="220" height="8" rx="2" fill="#9ca3af"/>
    <rect x="20" y="186" width="180" height="8" rx="2" fill="#9ca3af"/>
    <rect x="20" y="220" width="120" height="36" rx="8" fill="#6366f1"/>
    <text x="80" y="244" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">버튼</text>
  </g>
  <text x="200" y="65" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="700" fill="#0f172a">LIGHT</text>

  <!-- 다크: 동일 UI -->
  <g transform="translate(450 100)">
    <rect width="300" height="280" rx="14" fill="#1e293b" stroke="#334155"/>
    <rect x="20" y="20" width="260" height="100" rx="8" fill="#312e81"/>
    <circle cx="60" cy="65" r="20" fill="#818cf8"/>
    <rect x="92" y="50" width="120" height="10" rx="2" fill="#c7d2fe"/>
    <rect x="92" y="68" width="160" height="6" rx="2" fill="#6366f1"/>
    <rect x="20" y="140" width="180" height="10" rx="2" fill="#f1f5f9"/>
    <rect x="20" y="158" width="240" height="8" rx="2" fill="#475569"/>
    <rect x="20" y="172" width="220" height="8" rx="2" fill="#475569"/>
    <rect x="20" y="186" width="180" height="8" rx="2" fill="#475569"/>
    <rect x="20" y="220" width="120" height="36" rx="8" fill="#818cf8"/>
    <text x="80" y="244" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1e1b4b">버튼</text>
  </g>
  <text x="600" y="65" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="700" fill="#fef3c7">DARK</text>

  <!-- 가운데 토글 -->
  <g transform="translate(400 240)">
    <rect x="-40" y="-20" width="80" height="40" rx="20" fill="#fde047"/>
    <circle cx="-18" cy="0" r="14" fill="#fff"/>
    <circle cx="18" cy="0" r="14" fill="#1e293b"/>
  </g>

  <!-- 가운데 분리선 (얇은 보라) -->
  <line x1="400" y1="0" x2="400" y2="480" stroke="#8b5cf6" stroke-width="3" opacity="0.6"/>

  <!-- CSS 변수 표기 -->
  <text x="400" y="430" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#a78bfa">
    :root { --bg: ... } [data-theme="dark"] { --bg: ... }
  </text>
</svg>
