<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" role="img" aria-label="Tidy First 책 서평">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#831843"/>
      <stop offset="1" stop-color="#3b0764"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg4)"/>

  <!-- 책 그림자 -->
  <path d="M 280 110 L 580 110 L 600 440 L 260 440 Z" fill="rgba(0,0,0,0.5)"/>

  <!-- 책 본체 -->
  <g>
    <!-- 책등 -->
    <path d="M 280 100 L 580 100 L 580 420 L 280 420 Z" fill="#fafaf9"/>
    <!-- 표지 -->
    <rect x="290" y="100" width="290" height="320" fill="#fef3c7" stroke="#c2410c" stroke-width="2"/>
    <rect x="290" y="100" width="290" height="10" fill="#c2410c"/>
    <rect x="290" y="410" width="290" height="10" fill="#c2410c"/>

    <!-- 표지 텍스트 -->
    <g font-family="-apple-system, sans-serif" text-anchor="middle">
      <text x="435" y="180" font-size="40" font-weight="800" fill="#7c2d12" letter-spacing="-1">Tidy</text>
      <text x="435" y="225" font-size="40" font-weight="800" fill="#7c2d12" letter-spacing="-1">First?</text>
      <line x1="370" y1="245" x2="500" y2="245" stroke="#c2410c" stroke-width="2"/>
      <text x="435" y="278" font-size="12" font-weight="600" fill="#9a3412" letter-spacing="3">A PERSONAL EXERCISE</text>
      <text x="435" y="296" font-size="12" font-weight="600" fill="#9a3412" letter-spacing="3">IN EMPIRICAL</text>
      <text x="435" y="314" font-size="12" font-weight="600" fill="#9a3412" letter-spacing="3">SOFTWARE DESIGN</text>

      <text x="435" y="380" font-size="18" font-style="italic" fill="#7c2d12">KENT BECK</text>
    </g>

    <!-- 책 옆선 (페이지) -->
    <g stroke="#e7e5e4" stroke-width="0.5">
      <line x1="290" y1="115" x2="580" y2="115"/>
      <line x1="290" y1="120" x2="580" y2="120"/>
      <line x1="290" y1="400" x2="580" y2="400"/>
      <line x1="290" y1="405" x2="580" y2="405"/>
    </g>
  </g>

  <!-- 옆에 메모지/포스트잇 -->
  <g transform="rotate(-8 130 380)">
    <rect x="60" y="320" width="140" height="120" fill="#fef08a" stroke="#ca8a04"/>
    <line x1="80" y1="350" x2="180" y2="350" stroke="#a16207" stroke-width="1.2"/>
    <line x1="80" y1="375" x2="180" y2="375" stroke="#a16207" stroke-width="1.2"/>
    <line x1="80" y1="400" x2="160" y2="400" stroke="#a16207" stroke-width="1.2"/>
  </g>

  <!-- 안경 -->
  <g transform="translate(630 380)" stroke="#fef3c7" stroke-width="3" fill="none">
    <circle cx="0" cy="0" r="22"/>
    <circle cx="55" cy="0" r="22"/>
    <line x1="22" y1="0" x2="33" y2="0"/>
  </g>
</svg>
