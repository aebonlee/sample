<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" role="img" aria-label="디자인 시스템 토큰">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065f46"/>
      <stop offset="1" stop-color="#082f49"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg3)"/>

  <!-- 컬러 토큰 팔레트 -->
  <g>
    <rect x="60" y="80" width="100" height="100" rx="14" fill="#ef4444"/>
    <text x="110" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">--red-500</text>
    <rect x="180" y="80" width="100" height="100" rx="14" fill="#f59e0b"/>
    <text x="230" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">--amber-500</text>
    <rect x="300" y="80" width="100" height="100" rx="14" fill="#10b981"/>
    <text x="350" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">--emerald-500</text>
    <rect x="420" y="80" width="100" height="100" rx="14" fill="#3b82f6"/>
    <text x="470" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">--blue-500</text>
    <rect x="540" y="80" width="100" height="100" rx="14" fill="#8b5cf6"/>
    <text x="590" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">--violet-500</text>
    <rect x="660" y="80" width="80" height="100" rx="14" fill="#ec4899"/>
    <text x="700" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">--pink-500</text>
  </g>

  <!-- 타이포그래피 -->
  <g font-family="-apple-system, sans-serif" fill="#fff">
    <text x="60" y="270" font-size="40" font-weight="800">Aa</text>
    <text x="60" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">--font-display</text>

    <text x="170" y="270" font-size="32" font-weight="700">Aa</text>
    <text x="170" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">--font-h1</text>

    <text x="270" y="270" font-size="24" font-weight="600">Aa</text>
    <text x="270" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">--font-h2</text>

    <text x="360" y="270" font-size="18">Aa</text>
    <text x="360" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">--font-body</text>
  </g>

  <!-- 스페이싱 -->
  <g>
    <rect x="500" y="245" width="20" height="20" fill="#67e8f9"/>
    <rect x="530" y="245" width="20" height="20" fill="#67e8f9"/>
    <rect x="560" y="245" width="20" height="20" fill="#67e8f9"/>
    <rect x="600" y="245" width="20" height="20" fill="#67e8f9"/>
    <rect x="640" y="245" width="20" height="20" fill="#67e8f9"/>
    <text x="510" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">4</text>
    <text x="540" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">8</text>
    <text x="570" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">12</text>
    <text x="610" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">16</text>
    <text x="650" y="295" font-size="11" fill="#a7f3d0" font-family="ui-monospace, monospace">24</text>
  </g>

  <!-- 컴포넌트 미니어처 -->
  <g>
    <rect x="60" y="340" width="200" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
    <rect x="76" y="356" width="80" height="28" rx="14" fill="#10b981"/>
    <text x="116" y="375" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#fff" font-weight="700">Button</text>

    <rect x="290" y="340" width="200" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
    <rect x="306" y="356" width="168" height="28" rx="6" fill="#334155"/>
    <text x="316" y="375" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">Input field</text>

    <rect x="520" y="340" width="220" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
    <circle cx="540" cy="370" r="10" fill="#10b981"/>
    <text x="556" y="375" font-family="-apple-system,sans-serif" font-size="11" fill="#fff">Alert · 성공적으로 저장됨</text>
  </g>

  <!-- 제목 -->
  <text x="60" y="50" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#a7f3d0" letter-spacing="2">DESIGN SYSTEM</text>
</svg>
