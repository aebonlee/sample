<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" role="img" aria-label="사진작가 포트폴리오 미리보기">
  <defs>
    <linearGradient id="bg-pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1440" height="900" fill="url(#bg-pg)"/>

  <!-- 헤더 -->
  <g font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <text x="80" y="92" fill="#fff" font-size="38" font-weight="700" letter-spacing="-0.02em">Photographer</text>
    <text x="80" y="124" fill="#94a3b8" font-size="16">portfolio · 2026</text>

    <!-- 네비 -->
    <g font-size="14" fill="#cbd5e1">
      <text x="1075" y="106">전체</text>
      <text x="1135" y="106" fill="#fbbf24" font-weight="700">풍경</text>
      <text x="1195" y="106">도시</text>
      <text x="1255" y="106">인물</text>
      <text x="1315" y="106">여행</text>
      <line x1="1130" y1="116" x2="1170" y2="116" stroke="#fbbf24" stroke-width="2"/>
    </g>
  </g>

  <!-- 갤러리 그리드 (마사니식) - 7개 -->
  <g>
    <!-- 1: 큰 풍경 (좌상) -->
    <g transform="translate(80,180)">
      <rect width="430" height="320" rx="12" fill="url(#sky)"/>
      <!-- 산 실루엣 -->
      <polygon points="0,260 100,160 180,220 260,140 360,200 430,170 430,320 0,320" fill="#1e293b" opacity="0.7"/>
      <polygon points="0,290 80,210 160,240 230,200 320,250 430,220 430,320 0,320" fill="#0f172a" opacity="0.85"/>
      <!-- 태양 -->
      <circle cx="320" cy="100" r="46" fill="#fef3c7" opacity="0.85"/>
      <circle cx="320" cy="100" r="46" fill="#fff" opacity="0.3"/>
    </g>

    <!-- 2: 도시 야경 -->
    <g transform="translate(530,180)">
      <rect width="280" height="220" rx="12" fill="#020617"/>
      <!-- 빌딩 -->
      <rect x="20" y="80" width="40" height="140" fill="#1e3a8a"/>
      <rect x="75" y="40" width="34" height="180" fill="#312e81"/>
      <rect x="120" y="100" width="46" height="120" fill="#1e293b"/>
      <rect x="175" y="20" width="38" height="200" fill="#0c4a6e"/>
      <rect x="225" y="90" width="40" height="130" fill="#1f2937"/>
      <!-- 창문 불빛 -->
      <g fill="#fde047">
        <rect x="28" y="100" width="4" height="4"/>
        <rect x="40" y="120" width="4" height="4"/>
        <rect x="50" y="100" width="4" height="4"/>
        <rect x="80" y="60" width="4" height="4"/>
        <rect x="93" y="90" width="4" height="4"/>
        <rect x="100" y="140" width="4" height="4"/>
        <rect x="130" y="120" width="4" height="4"/>
        <rect x="145" y="160" width="4" height="4"/>
        <rect x="180" y="40" width="4" height="4"/>
        <rect x="195" y="80" width="4" height="4"/>
        <rect x="200" y="130" width="4" height="4"/>
        <rect x="232" y="120" width="4" height="4"/>
        <rect x="248" y="160" width="4" height="4"/>
      </g>
      <!-- 달 -->
      <circle cx="245" cy="44" r="14" fill="#f5f5f4"/>
    </g>

    <!-- 3: 바다 -->
    <g transform="translate(830,180)">
      <rect width="260" height="220" rx="12" fill="url(#sea)"/>
      <!-- 파도선 -->
      <path d="M0,140 Q65,130 130,140 T260,140 L260,220 L0,220 Z" fill="#0ea5e9" opacity="0.6"/>
      <path d="M0,170 Q65,160 130,170 T260,170 L260,220 L0,220 Z" fill="#082f49" opacity="0.7"/>
      <!-- 갈매기 -->
      <path d="M40,60 q8,-8 16,0 q8,-8 16,0" stroke="#fff" stroke-width="2" fill="none"/>
      <path d="M90,80 q6,-6 12,0 q6,-6 12,0" stroke="#fff" stroke-width="1.5" fill="none"/>
    </g>

    <!-- 4: 숲 -->
    <g transform="translate(1110,180)">
      <rect width="250" height="220" rx="12" fill="url(#forest)"/>
      <!-- 나무들 -->
      <g fill="#052e16">
        <polygon points="40,180 60,80 80,180"/>
        <polygon points="90,200 115,60 140,200"/>
        <polygon points="150,180 170,90 190,180"/>
      </g>
      <g fill="#166534">
        <polygon points="50,180 65,110 80,180"/>
        <polygon points="100,200 120,90 140,200"/>
        <polygon points="158,180 172,110 188,180"/>
      </g>
      <!-- 빛 -->
      <line x1="100" y1="0" x2="80" y2="200" stroke="#fef9c3" stroke-width="3" opacity="0.4"/>
      <line x1="140" y1="0" x2="110" y2="200" stroke="#fef9c3" stroke-width="2" opacity="0.3"/>
    </g>

    <!-- 5: 사물 (커피잔) -->
    <g transform="translate(80,520)">
      <rect width="260" height="220" rx="12" fill="url(#warm)"/>
      <!-- 커피잔 -->
      <ellipse cx="130" cy="105" rx="50" ry="14" fill="#fff" opacity="0.8"/>
      <path d="M85,105 L80,180 Q80,200 130,200 Q180,200 180,180 L175,105 Z" fill="#fff"/>
      <ellipse cx="130" cy="105" rx="50" ry="14" fill="#78350f"/>
      <!-- 김 -->
      <path d="M110,70 q5,-15 0,-30 M130,70 q-5,-15 0,-30 M150,70 q5,-15 0,-30" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
    </g>

    <!-- 6: 보라 풍경 (오로라) -->
    <g transform="translate(360,520)">
      <rect width="290" height="220" rx="12" fill="url(#purple)"/>
      <!-- 오로라 -->
      <path d="M0,60 Q70,30 140,80 T290,60 L290,180 L0,180 Z" fill="#22d3ee" opacity="0.3"/>
      <path d="M0,90 Q90,50 180,100 T290,90 L290,180 L0,180 Z" fill="#a855f7" opacity="0.5"/>
      <!-- 별 -->
      <g fill="#fff">
        <circle cx="40" cy="30" r="1.5"/>
        <circle cx="100" cy="20" r="1"/>
        <circle cx="180" cy="38" r="1.5"/>
        <circle cx="240" cy="25" r="1"/>
        <circle cx="265" cy="50" r="1.5"/>
      </g>
      <!-- 산 실루엣 -->
      <polygon points="0,180 60,140 120,170 180,135 250,165 290,150 290,220 0,220" fill="#1e1b4b"/>
    </g>

    <!-- 7: 시안 추상 -->
    <g transform="translate(670,520)">
      <rect width="240" height="220" rx="12" fill="url(#cool)"/>
      <!-- 추상적 원 -->
      <circle cx="80" cy="80" r="50" fill="#fff" opacity="0.3"/>
      <circle cx="160" cy="140" r="38" fill="#fff" opacity="0.2"/>
      <circle cx="120" cy="180" r="25" fill="#fff" opacity="0.4"/>
    </g>

    <!-- 8: 인물 실루엣 -->
    <g transform="translate(930,520)">
      <rect width="200" height="220" rx="12" fill="#374151"/>
      <!-- 머리 -->
      <circle cx="100" cy="100" r="30" fill="#fed7aa"/>
      <!-- 어깨 -->
      <path d="M50,220 Q50,150 100,140 Q150,150 150,220 Z" fill="#1f2937"/>
      <!-- 머리카락 -->
      <path d="M75,90 Q75,70 100,70 Q125,70 125,90 L125,100 L75,100 Z" fill="#1c1917"/>
    </g>

    <!-- 9: 여행 (지도 모티프) -->
    <g transform="translate(1150,520)">
      <rect width="210" height="220" rx="12" fill="#fef3c7"/>
      <!-- 지도 -->
      <path d="M30,40 L180,40 L180,180 L30,180 Z" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
      <!-- 경로 -->
      <path d="M50,60 Q90,100 70,140 Q110,170 160,150" stroke="#dc2626" stroke-width="3" fill="none" stroke-dasharray="6 4"/>
      <!-- 마커 -->
      <circle cx="50" cy="60" r="6" fill="#dc2626"/>
      <circle cx="160" cy="150" r="6" fill="#dc2626"/>
      <!-- 컴퍼스 -->
      <g transform="translate(150,75)">
        <circle r="14" fill="#fff" stroke="#92400e" stroke-width="1"/>
        <polygon points="0,-10 4,0 0,10 -4,0" fill="#dc2626"/>
        <text x="0" y="-16" font-size="8" fill="#92400e" text-anchor="middle">N</text>
      </g>
    </g>
  </g>

  <!-- 푸터 -->
  <g font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <line x1="80" y1="800" x2="1360" y2="800" stroke="#1e293b"/>
    <text x="80" y="845" fill="#64748b" font-size="14">© photographer · 마사니식 컴럼 갤러리 + 카테고리 필터 + 라이트박스</text>
  </g>
</svg>
