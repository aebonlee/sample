<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="대시보드 리디자인">
  <defs>
    <linearGradient id="d1-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#d1-bg)"/>

  <!-- 대시보드 -->
  <g transform="translate(60 40)">
    <rect width="480" height="280" rx="10" fill="#fff" stroke="#a5b4fc"/>

    <!-- 사이드바 -->
    <rect x="0" y="0" width="80" height="280" rx="10" fill="#f1f5f9"/>
    <rect x="0" y="0" width="80" height="44" fill="#6366f1"/>
    <circle cx="24" cy="22" r="10" fill="#fff"/>
    <text x="40" y="27" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">DASH</text>

    <g transform="translate(12 60)">
      <rect width="56" height="22" rx="4" fill="#6366f1"/>
      <rect y="30" width="56" height="22" rx="4" fill="#e5e7eb"/>
      <rect y="60" width="56" height="22" rx="4" fill="#e5e7eb"/>
      <rect y="90" width="56" height="22" rx="4" fill="#e5e7eb"/>
      <rect y="120" width="56" height="22" rx="4" fill="#e5e7eb"/>
    </g>

    <!-- KPI 카드 4개 -->
    <g transform="translate(100 20)">
      <rect width="86" height="56" rx="6" fill="#ede9fe"/>
      <text x="10" y="22" font-family="-apple-system,sans-serif" font-size="9" fill="#5b21b6" font-weight="700">활성 사용자</text>
      <text x="10" y="44" font-family="-apple-system,sans-serif" font-size="18" fill="#4c1d95" font-weight="800">503K</text>

      <rect x="96" width="86" height="56" rx="6" fill="#fce7f3"/>
      <text x="106" y="22" font-family="-apple-system,sans-serif" font-size="9" fill="#9d174d" font-weight="700">전환율</text>
      <text x="106" y="44" font-family="-apple-system,sans-serif" font-size="18" fill="#831843" font-weight="800">8.2%</text>

      <rect x="192" width="86" height="56" rx="6" fill="#dbeafe"/>
      <text x="202" y="22" font-family="-apple-system,sans-serif" font-size="9" fill="#1e40af" font-weight="700">매출</text>
      <text x="202" y="44" font-family="-apple-system,sans-serif" font-size="18" fill="#1e3a8a" font-weight="800">$84K</text>

      <rect x="288" width="86" height="56" rx="6" fill="#dcfce7"/>
      <text x="298" y="22" font-family="-apple-system,sans-serif" font-size="9" fill="#166534" font-weight="700">평점</text>
      <text x="298" y="44" font-family="-apple-system,sans-serif" font-size="18" fill="#14532d" font-weight="800">4.8</text>
    </g>

    <!-- 라인 차트 -->
    <g transform="translate(100 90)">
      <rect width="270" height="170" rx="6" fill="#fafafa"/>
      <text x="14" y="20" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0f172a">월간 사용자 증가</text>
      <!-- 그리드 -->
      <g stroke="#e5e7eb" stroke-width="0.5">
        <line x1="14" y1="50" x2="256" y2="50"/>
        <line x1="14" y1="80" x2="256" y2="80"/>
        <line x1="14" y1="110" x2="256" y2="110"/>
        <line x1="14" y1="140" x2="256" y2="140"/>
      </g>
      <!-- 라인 -->
      <polyline points="14,135 50,120 86,128 122,100 158,108 194,80 230,68 256,50" stroke="#6366f1" stroke-width="2.5" fill="none"/>
      <polyline points="14,135 50,120 86,128 122,100 158,108 194,80 230,68 256,50 256,160 14,160 Z" fill="#6366f1" opacity="0.18"/>
      <!-- 점 -->
      <circle cx="194" cy="80" r="4" fill="#6366f1"/>
      <circle cx="230" cy="68" r="4" fill="#6366f1"/>
      <circle cx="256" cy="50" r="4" fill="#6366f1"/>
    </g>

    <!-- 도넛 차트 -->
    <g transform="translate(384 100)">
      <circle r="55" fill="#ede9fe"/>
      <path d="M 0 -55 A 55 55 0 0 1 47 27 L 0 0 Z" fill="#8b5cf6"/>
      <path d="M 47 27 A 55 55 0 0 1 -47 27 L 0 0 Z" fill="#ec4899"/>
      <circle r="28" fill="#fff"/>
      <text y="-2" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="800" fill="#0f172a">42%</text>
      <text y="14" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">신규</text>
    </g>
  </g>

  <text x="60" y="346" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="#c7d2fe">대시보드 리디자인 · React · TypeScript · D3</text>
</svg>
