  <!-- 라이트하우스 100점 원 (우상단) -->
  <g transform="translate(490 70)">
    <circle r="36" fill="#fff"/>
    <circle r="36" fill="none" stroke="#10b981" stroke-width="4"/>
    <text y="2" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="22" font-weight="800" fill="#10b981">100</text>
    <text y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" fill="#065f46">Lighthouse</text>
