<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="마케팅 사이트 — 100점 라이트하우스">
  <defs>
    <linearGradient id="d3-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#9f1239"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#d3-bg)"/>

  <!-- 브라우저 프레임 -->
  <g transform="translate(60 40)">
