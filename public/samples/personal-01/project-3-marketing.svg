      <!-- 기능 3개 -->
      <g transform="translate(20 140)">
        <rect width="135" height="84" rx="6" fill="#fff" stroke="#e5e7eb"/>
        <circle cx="20" cy="20" r="10" fill="#fb923c"/>
        <rect x="38" y="14" width="60" height="6" rx="2" fill="#0f172a"/>
        <rect x="10" y="38" width="115" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="10" y="48" width="100" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="10" y="58" width="90" height="4" rx="2" fill="#cbd5e1"/>

        <rect x="155" width="135" height="84" rx="6" fill="#fff" stroke="#e5e7eb"/>
        <circle cx="175" cy="20" r="10" fill="#10b981"/>
        <rect x="193" y="14" width="60" height="6" rx="2" fill="#0f172a"/>
        <rect x="165" y="38" width="115" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="165" y="48" width="100" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="165" y="58" width="90" height="4" rx="2" fill="#cbd5e1"/>

        <rect x="310" width="130" height="84" rx="6" fill="#fff" stroke="#e5e7eb"/>
        <circle cx="330" cy="20" r="10" fill="#3b82f6"/>
        <rect x="348" y="14" width="60" height="6" rx="2" fill="#0f172a"/>
        <rect x="320" y="38" width="110" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="320" y="48" width="95" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="320" y="58" width="85" height="4" rx="2" fill="#cbd5e1"/>
