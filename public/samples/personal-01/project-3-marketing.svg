    <circle cx="14" cy="16" r="4" fill="#ef4444"/>
    <circle cx="28" cy="16" r="4" fill="#fbbf24"/>
    <circle cx="42" cy="16" r="4" fill="#10b981"/>
    <rect x="60" y="8" width="240" height="16" rx="8" fill="#e2e8f0"/>
    <text x="70" y="20" font-family="ui-monospace,monospace" font-size="9" fill="#64748b">https://product.io</text>

    <!-- 페이지 콘텐츠 -->
    <g transform="translate(0 40)">
