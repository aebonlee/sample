<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="Figma UI 디자인 강의">
  <defs>
    <linearGradient id="ui-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#831843"/>
      <stop offset="1" stop-color="#3b0764"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#ui-bg)"/>

  <!-- Figma 로고 (도형 조합) -->
  <g transform="translate(420 100)">
    <circle cx="40" cy="40" r="40" fill="#f24e1e"/>
    <circle cx="40" cy="40" r="40" fill="#a259ff" transform="translate(40 0)"/>
    <circle cx="40" cy="40" r="40" fill="#0acf83" transform="translate(0 80)"/>
    <circle cx="40" cy="40" r="40" fill="#1abcfe" transform="translate(40 80)"/>
    <circle cx="40" cy="40" r="40" fill="#ff7262" transform="translate(0 160)"/>
  </g>

  <!-- 디자인 보드 미니어처 -->
  <g transform="translate(40 80)">
    <!-- 디자인 캔버스 -->
    <rect width="320" height="240" rx="8" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
    <!-- 헤더 -->
    <rect x="0" y="0" width="320" height="32" rx="8" fill="#a78bfa"/>
    <rect x="0" y="24" width="320" height="8" fill="#a78bfa"/>
    <circle cx="14" cy="16" r="4" fill="#f87171"/>
    <circle cx="28" cy="16" r="4" fill="#fbbf24"/>
    <circle cx="42" cy="16" r="4" fill="#34d399"/>
    <rect x="60" y="11" width="80" height="10" rx="2" fill="#ddd6fe"/>

    <!-- 좌측 사이드 -->
    <rect x="0" y="32" width="50" height="208" fill="#f1f5f9"/>
    <rect x="12" y="46" width="26" height="10" rx="2" fill="#a78bfa"/>
    <rect x="12" y="62" width="20" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="12" y="74" width="24" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="12" y="86" width="18" height="6" rx="2" fill="#cbd5e1"/>

    <!-- 메인 컴포넌트 -->
    <rect x="68" y="56" width="140" height="76" rx="6" fill="#ede9fe"/>
    <rect x="78" y="68" width="60" height="8" rx="2" fill="#7c3aed"/>
    <rect x="78" y="82" width="110" height="6" rx="2" fill="#a78bfa"/>
    <rect x="78" y="94" width="90" height="6" rx="2" fill="#a78bfa"/>
    <rect x="78" y="110" width="50" height="14" rx="7" fill="#7c3aed"/>

    <rect x="218" y="56" width="80" height="76" rx="6" fill="#fce7f3"/>
    <circle cx="258" cy="80" r="14" fill="#db2777"/>
    <rect x="234" y="100" width="48" height="6" rx="2" fill="#831843"/>
    <rect x="234" y="112" width="38" height="6" rx="2" fill="#9d174d"/>

    <rect x="68" y="148" width="230" height="76" rx="6" fill="#dbeafe"/>
    <rect x="80" y="160" width="100" height="8" rx="2" fill="#1d4ed8"/>
    <rect x="80" y="174" width="200" height="6" rx="2" fill="#60a5fa"/>
    <rect x="80" y="186" width="180" height="6" rx="2" fill="#60a5fa"/>
    <rect x="80" y="200" width="60" height="14" rx="7" fill="#2563eb"/>
  </g>

  <g font-family="-apple-system,sans-serif">
    <rect x="40" y="32" width="140" height="24" rx="12" fill="rgba(244,114,182,0.20)"/>
    <text x="110" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#fbcfe8">디자인 · 10h</text>
  </g>
</svg>
