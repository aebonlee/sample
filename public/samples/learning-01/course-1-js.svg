<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="모던 자바스크립트 강의">
  <defs>
    <linearGradient id="js-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#js-bg)"/>

  <!-- JS 로고 박스 -->
  <g transform="translate(420 120)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="#f7df1e"/>
    <text x="103" y="100" text-anchor="end" font-family="-apple-system,sans-serif" font-size="44" font-weight="800" fill="#0f172a">JS</text>
  </g>

  <!-- 코드 라인 -->
  <g font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">
    <text x="40" y="80"><tspan fill="#f472b6">const</tspan> <tspan fill="#fbbf24">user</tspan> = {</text>
    <text x="60" y="105"><tspan fill="#94a3b8">name:</tspan> <tspan fill="#34d399">'Modern JS'</tspan>,</text>
    <text x="60" y="130"><tspan fill="#94a3b8">level:</tspan> <tspan fill="#60a5fa">2025</tspan>,</text>
    <text x="40" y="155">};</text>

    <text x="40" y="200"><tspan fill="#f472b6">async function</tspan> <tspan fill="#fbbf24">build</tspan>() {</text>
    <text x="60" y="225">  <tspan fill="#f472b6">await</tspan> learn();</text>
    <text x="60" y="250">  <tspan fill="#f472b6">return</tspan> 🚀;</text>
    <text x="40" y="275">}</text>
  </g>

  <!-- 상단 라벨 -->
  <g font-family="-apple-system,sans-serif">
    <rect x="40" y="32" width="120" height="24" rx="12" fill="rgba(247,223,30,0.18)"/>
    <text x="100" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#fde047">WEB DEV · 12h</text>
  </g>

  <!-- 별 -->
  <g fill="#fde047" opacity="0.7">
    <circle cx="80" cy="320" r="2"/>
    <circle cx="200" cy="330" r="1.5"/>
    <circle cx="350" cy="310" r="2"/>
    <circle cx="500" cy="320" r="1.5"/>
  </g>
</svg>
