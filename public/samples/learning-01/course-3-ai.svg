<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="LLM Claude API 강의">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#ai-bg)"/>

  <!-- AI 뉴럴 노드 -->
  <g transform="translate(420 180)" stroke="#34d399" stroke-width="1.5" fill="none">
    <!-- 입력층 -->
    <circle cx="-50" cy="-60" r="10" fill="#10b981"/>
    <circle cx="-50" cy="0"   r="10" fill="#10b981"/>
    <circle cx="-50" cy="60"  r="10" fill="#10b981"/>
    <!-- 은닉층 -->
    <circle cx="0" cy="-80" r="10" fill="#22d3ee"/>
    <circle cx="0" cy="-30" r="10" fill="#22d3ee"/>
    <circle cx="0" cy="30"  r="10" fill="#22d3ee"/>
    <circle cx="0" cy="80"  r="10" fill="#22d3ee"/>
    <!-- 출력층 -->
    <circle cx="50" cy="-30" r="10" fill="#a78bfa"/>
    <circle cx="50" cy="30"  r="10" fill="#a78bfa"/>

    <!-- 연결선 -->
    <g opacity="0.4">
      <line x1="-40" y1="-60" x2="-10" y2="-80"/>
      <line x1="-40" y1="-60" x2="-10" y2="-30"/>
      <line x1="-40" y1="-60" x2="-10" y2="30"/>
      <line x1="-40" y1="0" x2="-10" y2="-80"/>
      <line x1="-40" y1="0" x2="-10" y2="-30"/>
      <line x1="-40" y1="0" x2="-10" y2="30"/>
      <line x1="-40" y1="0" x2="-10" y2="80"/>
      <line x1="-40" y1="60" x2="-10" y2="-30"/>
      <line x1="-40" y1="60" x2="-10" y2="30"/>
      <line x1="-40" y1="60" x2="-10" y2="80"/>
      <line x1="10" y1="-80" x2="40" y2="-30"/>
      <line x1="10" y1="-30" x2="40" y2="-30"/>
      <line x1="10" y1="-30" x2="40" y2="30"/>
      <line x1="10" y1="30" x2="40" y2="-30"/>
      <line x1="10" y1="30" x2="40" y2="30"/>
      <line x1="10" y1="80" x2="40" y2="30"/>
    </g>
  </g>

  <!-- Claude API 호출 코드 -->
  <g font-family="ui-monospace,monospace" font-size="13" fill="#86efac">
    <text x="40" y="80"><tspan fill="#7dd3fc">import</tspan> anthropic</text>

    <text x="40" y="120">client = anthropic.<tspan fill="#fbbf24">Anthropic</tspan>()</text>

    <text x="40" y="155">message = client.messages.<tspan fill="#fbbf24">create</tspan>(</text>
    <text x="40" y="178">  model=<tspan fill="#fde047">"claude-opus"</tspan>,</text>
    <text x="40" y="201">  max_tokens=1024,</text>
    <text x="40" y="224">  messages=[{</text>
    <text x="40" y="247">    <tspan fill="#94a3b8">"role"</tspan>: <tspan fill="#fde047">"user"</tspan>,</text>
    <text x="40" y="270">    <tspan fill="#94a3b8">"content"</tspan>: prompt,</text>
    <text x="40" y="293">  }]</text>
    <text x="40" y="316">)</text>
  </g>

  <g font-family="-apple-system,sans-serif">
    <rect x="40" y="32" width="120" height="24" rx="12" fill="rgba(52,211,153,0.20)"/>
    <text x="100" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">AI · 8h · 신규</text>
  </g>
</svg>
