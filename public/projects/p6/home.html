<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자기소개서 코치 — 경험 입력</title>
  <style>
    :root {
      --bg: #faf5ff; --surface: #fff; --border: #e9d5ff;
      --text: #581c87; --text-dim: #6b21a8; --text-mute: #a855f7;
      --accent: #7c3aed; --accent-2: #a78bfa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; gap: 18px; align-items: center; }
    .brand { font-weight: 800; }
    nav { margin-left: auto; display: flex; gap: 14px; }
    nav a { color: var(--text-dim); text-decoration: none; font-size: .9rem; padding: 6px 12px; border-radius: 8px; }
    nav a.on { background: var(--accent); color: #fff; }

    .stepper { max-width: 900px; margin: 24px auto 0; padding: 0 24px; display: flex; gap: 8px; align-items: center; }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: 2px solid var(--border); display: grid; place-items: center; font-weight: 700; font-size: .82rem; color: var(--text-mute); }
    .step-dot.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-dot.done { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    .step-line { flex: 1; height: 2px; background: var(--border); }
    .step-line.done { background: var(--accent-2); }
    .step-label { color: var(--text-dim); font-size: .82rem; }

    .page-head { max-width: 900px; margin: 24px auto 8px; padding: 0 24px; }
    .page-head h1 { margin: 0 0 6px; font-size: 1.5rem; }
    .page-head p { color: var(--text-dim); margin: 0; }

    .container { max-width: 900px; margin: 20px auto; padding: 0 24px 80px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-weight: 600; margin-bottom: 8px; font-size: .92rem; }
    .field input, .field textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border);
      background: var(--bg); border-radius: 10px;
      font-family: inherit; font-size: .95rem; outline: none; color: var(--text);
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { min-height: 140px; resize: vertical; line-height: 1.7; }
    .field__hint { color: var(--text-mute); font-size: .8rem; margin-top: 6px; }

    .examples { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .example-btn {
      padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; font-size: .82rem; text-align: left;
      color: var(--text-dim);
    }
    .example-btn:hover { color: var(--text); border-color: var(--accent); }

    .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn { padding: 11px 22px; border-radius: 10px; font-family: inherit; font-weight: 600; cursor: pointer; border: 1px solid transparent; font-size: .9rem; }
    .btn--primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; }
    .btn--ghost { background: transparent; color: var(--text); border-color: var(--border); }

    .tip { display: flex; gap: 12px; padding: 14px 16px; background: rgba(167,139,250,.1); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; margin-bottom: 18px; font-size: .88rem; color: var(--text-dim); }
  </style>
</head>
<body>
  <header class="nav">
    <div class="brand">📝 자소서 코치</div>
    <button type="button" class="nav__toggle" aria-label="메뉴 열기" aria-expanded="false">☰</button>
    <nav class="nav-links">
      <a class="on" href="home.html">경험 입력</a>
      <a href="star.html">STAR 결과</a>
      <a href="write.html">자소서 작성</a>
      <a href="feedback.html">피드백</a>
      <a href="interview.html">면접 준비</a>
      <a href="my.html">내 자소서</a>
    </nav>
  </header>

  <div class="stepper">
    <span class="step-dot on">1</span><span class="step-label">경험</span>
    <span class="step-line"></span>
    <span class="step-dot">2</span><span class="step-label">STAR</span>
    <span class="step-line"></span>
    <span class="step-dot">3</span><span class="step-label">작성</span>
    <span class="step-line"></span>
    <span class="step-dot">4</span><span class="step-label">피드백</span>
    <span class="step-line"></span>
    <span class="step-dot">5</span><span class="step-label">면접</span>
  </div>

  <div class="page-head">
    <h1>📝 가장 자랑스러운 경험을 들려주세요</h1>
    <p>자유롭게 적어주시면 AI가 STAR 구조로 정리해 자소서 문항에 활용할 수 있게 만들어드립니다.</p>
  </div>

  <main class="container">
    <div class="card">
      <div class="tip">
        💡 <strong>STAR란?</strong> Situation(상황) · Task(과제) · Action(행동) · Result(결과)의 약자입니다. 자소서·면접에서 가장 효과적인 경험 정리 방식이에요.
      </div>

      <div class="field">
        <label>① 경험의 제목</label>
        <input type="text" placeholder="예) 대학교 캡스톤 프로젝트 리더 경험" />
      </div>

      <div class="field">
        <label>② 경험을 자유롭게 적어주세요</label>
        <textarea placeholder="언제, 어디서, 누구와 함께, 어떤 상황이었고, 무엇을 했고, 어떤 결과가 있었는지 — 떠오르는 대로 자유롭게 적으면 됩니다. (최소 200자)"></textarea>
        <p class="field__hint">📌 0 / 2000자</p>
        <div class="examples">
          <button class="example-btn" type="button">✨ 학교 동아리에서 100명 행사 기획한 경험 예시 보기</button>
          <button class="example-btn" type="button">✨ 인턴십에서 데이터 분석 보고서 작성 예시 보기</button>
        </div>
      </div>

      <div class="field">
        <label>③ 이 경험에서 강조하고 싶은 역량</label>
        <input type="text" placeholder="예) 리더십, 문제해결, 협업, 끈기..." />
      </div>

      <div class="field">
        <label>④ 어느 직무·기업에 활용하실 건가요? <small style="color: var(--text-mute);">(선택)</small></label>
        <input type="text" placeholder="예) 카카오 백엔드 개발자" />
      </div>

      <div class="actions">
        <button class="btn btn--ghost" type="button">임시 저장</button>
        <button class="btn btn--primary" type="button">✨ STAR로 정리하기</button>
      </div>
    </div>
  </main>
<script>
  // 모바일 햄버거 메뉴 토글
  (function() {
    var CLS = 'nav-links';
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.nav__toggle');
      if (btn) {
        var nav = btn.parentElement.querySelector('.' + CLS);
        if (nav) {
          var open = nav.classList.toggle('is-open');
          btn.setAttribute('aria-expanded', open);
        }
        e.preventDefault();
        e.stopPropagation();
        return;
      }
      if (!e.target.closest('.' + CLS)) {
        document.querySelectorAll('.' + CLS + '.is-open').forEach(function(n) { n.classList.remove('is-open'); });
        document.querySelectorAll('.nav__toggle').forEach(function(b) { b.setAttribute('aria-expanded', 'false'); });
      }
    });
    document.addEventListener('click', function(e) {
      var link = e.target.closest('.' + CLS + ' a');
      if (link) {
        document.querySelectorAll('.' + CLS + '.is-open').forEach(function(n) { n.classList.remove('is-open'); });
      }
    });
  })();
</script>
</body>
</html>
